version: '3.8'

services:
  # Python FastAPI Application Server
  backend:
    build:
      context: ./backend
    container_name: aidso-backend
    depends_on:
      - postgres
      - redis
      - minio
      - kafka
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/aidso
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - KAFKA_BROKERS=kafka:29092
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app

  # React Frontend Client served via Nginx
  frontend:
    build:
      context: ./frontend
    container_name: aidso-frontend
    depends_on:
      - backend
    # Port mapping removed - access goes through api-gateway reverse proxy

  # Nginx API Gateway & Load Balancer
  api-gateway:
    build:
      context: ./gateway
    container_name: aidso-gateway
    depends_on:
      - frontend
      - backend
    ports:
      - "8081:80"

  # Database Storage
  postgres:
    image: postgres:15-alpine
    container_name: aidso-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Session and assistant cache
  redis:
    image: redis:7-alpine
    container_name: aidso-redis
    ports:
      - "6379:6379"

  # S3 Compatible storage for datasets & binaries
  minio:
    image: minio/minio
    container_name: aidso-minio
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Kafka pipeline event broker
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: aidso-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: aidso-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # Experiment tracking dashboard
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.4.0
    container_name: aidso-mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /tmp/mlflow

volumes:
  postgres_data:
  minio_data:
